{% extends 'base.html' %}
{% block title %}Menu - App Financeiro{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Menu</h1>
</div>

<div class="card">
  <div class="card-body menu-grid">
    <a href="{{ url_for('categorias.listar') }}" class="menu-item">
      <span class="menu-icon">🏷️</span>
      <span>Categorias</span>
    </a>
    <a href="{{ url_for('cartoes.listar') }}" class="menu-item">
      <span class="menu-icon">💳</span>
      <span>Cartões</span>
    </a>
    <a href="{{ url_for('parcelamentos.listar') }}" class="menu-item">
      <span class="menu-icon">📄</span>
      <span>Parcelamentos</span>
    </a>
    <a href="{{ url_for('contas_fixas.listar') }}" class="menu-item">
      <span class="menu-icon">📋</span>
      <span>Contas Fixas</span>
    </a>
    <a href="{{ url_for('metas.listar') }}" class="menu-item">
      <span class="menu-icon">🎯</span>
      <span>Metas</span>
    </a>
    <a href="{{ url_for('orcamentos.listar') }}" class="menu-item">
      <span class="menu-icon">📊</span>
      <span>Orçamentos</span>
    </a>
    <a href="{{ url_for('auth.perfil') }}" class="menu-item">
      <span class="menu-icon">👤</span>
      <span>Perfil</span>
    </a>
    <a href="{{ url_for('auth.logout') }}" class="menu-item menu-logout">
      <span class="menu-icon">🚪</span>
      <span>Sair ({{ current_user.nome }})</span>
    </a>
    <button id="toggleThemeMobile" class="menu-item" style="border:none;cursor:pointer;width:100%;font-family:inherit;font-size:inherit">
      <span class="menu-icon">☀️</span>
      <span id="toggleThemeText">Modo Claro</span>
    </button>
    <button id="installBtn" class="menu-item" style="display:none;border:none;cursor:pointer;width:100%;font-family:inherit;font-size:inherit">
      <span class="menu-icon">📲</span>
      <span>Instalar App</span>
    </button>
  </div>
</div>

<script>
  if (deferredPrompt) document.getElementById('installBtn').style.display = 'flex';
  document.getElementById('installBtn')?.addEventListener('click', async () => {
    if (deferredPrompt) { deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt = null; }
  });
  (function() {
    var btn = document.getElementById('toggleThemeMobile');
    var text = document.getElementById('toggleThemeText');
    function update() {
      var isLight = document.documentElement.getAttribute('data-theme') === 'light';
      text.textContent = isLight ? 'Modo Escuro' : 'Modo Claro';
      btn.querySelector('.menu-icon').textContent = isLight ? '🌙' : '☀️';
    }
    update();
    btn.addEventListener('click', function() {
      document.getElementById('toggleTheme').click();
      setTimeout(update, 50);
    });
  })();
</script>

<style>
  .menu-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1rem;
    padding: 1rem;
  }
  .menu-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    padding: 1.5rem;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    text-decoration: none;
    color: var(--text);
    font-weight: 500;
    transition: all 0.2s;
  }
  .menu-item:hover {
    background: var(--bg-hover);
    transform: translateY(-2px);
  }
  .menu-icon {
    font-size: 1.5rem;
  }
  .menu-logout {
    border-color: var(--danger);
    color: var(--danger);
  }
  .menu-logout:hover {
    background: rgba(239, 68, 68, 0.1);
  }
</style>
{% endblock %}
